<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StringKit</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f5f7fa;
  color: #1f2937;
  min-height: 100vh;
}

/* ── Header ── */
header {
  padding: 1.25rem 2rem;
  border-bottom: 1px solid #e5e7eb;
  display: flex;
  align-items: baseline;
  gap: 1rem;
  background: #ffffff;
}
header h1 { font-size: 1.4rem; font-weight: 700; color: #6d28d9; letter-spacing: 0.04em; }
header p  { font-size: 0.75rem; color: #9ca3af; }

/* ── Tabs ── */
.tabs {
  display: flex;
  padding: 0 2rem;
  border-bottom: 1px solid #e5e7eb;
  overflow-x: auto;
  scrollbar-width: none;
  background: #ffffff;
}
.tabs::-webkit-scrollbar { display: none; }

.tab-btn {
  padding: 0.75rem 1.2rem;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: #6b7280;
  cursor: pointer;
  font-size: 0.875rem;
  white-space: nowrap;
  transition: color 0.15s, border-color 0.15s;
}
.tab-btn:hover  { color: #374151; }
.tab-btn.active { color: #6d28d9; border-bottom-color: #6d28d9; }

/* ── Main layout ── */
main {
  padding: 1.75rem 2rem;
  max-width: 900px;
  margin: 0 auto;
}

.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── Form elements ── */
.field-label {
  font-size: 0.7rem;
  color: #6b7280;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-bottom: 0.4rem;
}

textarea {
  width: 100%;
  height: 150px;
  background: #ffffff;
  border: 1px solid #d1d5db;
  border-radius: 8px;
  color: #1f2937;
  padding: 0.875rem 1rem;
  font-family: 'Courier New', Courier, monospace;
  font-size: 0.85rem;
  resize: vertical;
  outline: none;
  transition: border-color 0.15s;
  line-height: 1.6;
}
textarea:focus { border-color: #7c3aed; }
textarea::placeholder { color: #9ca3af; }
textarea[readonly] { background: #f9fafb; cursor: default; }

/* ── Button row ── */
.btn-row {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  margin: 0.625rem 0;
}

/* Case grid */
.case-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
  gap: 0.5rem;
  margin: 0.625rem 0;
}

/* Buttons */
.btn {
  padding: 0.45rem 1.1rem;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.825rem;
  font-weight: 500;
  transition: background 0.15s, color 0.15s;
  white-space: nowrap;
}
.btn-primary {
  background: #6d28d9;
  color: #fff;
}
.btn-primary:hover { background: #5b21b6; }

.btn-sub {
  background: #e5e7eb;
  color: #374151;
  border: 1px solid #d1d5db;
}
.btn-sub:hover { background: #d1d5db; color: #111827; }

.btn-ghost {
  background: transparent;
  color: #6b7280;
  border: 1px solid #d1d5db;
}
.btn-ghost:hover { color: #374151; border-color: #9ca3af; }

/* ── Output wrapper ── */
.output-wrap { position: relative; }

.copy-btn {
  position: absolute;
  top: 0.5rem;
  right: 0.5rem;
  padding: 0.2rem 0.65rem;
  background: #f3f4f6;
  border: 1px solid #d1d5db;
  border-radius: 4px;
  color: #6b7280;
  cursor: pointer;
  font-size: 0.72rem;
  transition: color 0.15s, border-color 0.15s;
}
.copy-btn:hover         { color: #374151; }
.copy-btn.copied        { color: #059669; border-color: #059669; }

/* ── Error / note text ── */
.err-line  { min-height: 1.3em; font-size: 0.78rem; color: #dc2626; margin: 0.3rem 0; }
.note-line { font-size: 0.75rem; color: #9ca3af; margin: 0.35rem 0; }

/* ── Section divider ── */
.divider { border: none; border-top: 1px solid #e5e7eb; margin: 0.75rem 0; }

/* ── Diff tab ── */
.diff-input-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.75rem;
}
.diff-badge {
  display: inline-block;
  padding: 1px 8px;
  border-radius: 9999px;
  font-size: 0.68rem;
  font-weight: 700;
  text-transform: none;
  letter-spacing: 0;
}
.diff-badge-old { background: #fee2e2; color: #b91c1c; }
.diff-badge-new { background: #dcfce7; color: #15803d; }

.diff-view-toggle {
  margin-left: auto;
  display: flex;
  border: 1px solid #d1d5db;
  border-radius: 6px;
  overflow: hidden;
}
.diff-vbtn {
  padding: 0.35rem 0.9rem;
  background: #fff;
  border: none;
  border-radius: 0;
  color: #6b7280;
  cursor: pointer;
  font-size: 0.78rem;
  font-weight: 500;
  white-space: nowrap;
  transition: background 0.15s, color 0.15s;
}
.diff-vbtn.active { background: #6d28d9; color: #fff; }
.diff-vbtn:hover:not(.active) { background: #f3f4f6; }

.diff-stats {
  display: flex;
  gap: 1rem;
  font-size: 0.8rem;
  margin: 0.5rem 0;
}
.diff-stat-add { color: #15803d; font-weight: 600; }
.diff-stat-del { color: #b91c1c; font-weight: 600; }
.diff-stat-eq  { color: #6b7280; font-weight: 600; }

.diff-output {
  font-family: 'Courier New', Courier, monospace;
  font-size: 0.8rem;
  line-height: 1.6;
  border: 1px solid #e5e7eb;
  border-radius: 8px;
  overflow: hidden;
  margin-top: 0.5rem;
}
.diff-empty {
  padding: 2rem;
  text-align: center;
  color: #9ca3af;
  font-family: inherit;
  font-size: 0.85rem;
}

.unified-table { width: 100%; border-collapse: collapse; }
.unified-table tr { border-bottom: 1px solid #f0f0f0; }
.unified-table tr:last-child { border-bottom: none; }

.split-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
.split-table tr { border-bottom: 1px solid #f0f0f0; }
.split-table tr:last-child { border-bottom: none; }
.split-table .split-divider { width: 1px; background: #e5e7eb; padding: 0; }

.line-num {
  user-select: none;
  min-width: 36px;
  width: 36px;
  padding: 2px 6px;
  text-align: right;
  color: #9ca3af;
  background: #f9fafb;
  border-right: 1px solid #e5e7eb;
  font-size: 0.7rem;
  vertical-align: top;
}
.line-sign {
  user-select: none;
  width: 20px;
  text-align: center;
  font-weight: 700;
  padding: 2px 3px;
  vertical-align: top;
}
.line-content {
  padding: 2px 6px;
  white-space: pre-wrap;
  word-break: break-all;
  vertical-align: top;
  width: 100%;
}

tr.add .line-num    { background: #dcfce7; }
tr.add .line-sign   { color: #15803d; background: #dcfce7; }
tr.add .line-content { background: #f0fdf4; }
tr.del .line-num    { background: #fee2e2; }
tr.del .line-sign   { color: #b91c1c; background: #fee2e2; }
tr.del .line-content { background: #fff5f5; }
tr.ctx .line-sign   { color: #d1d5db; }

.char-add { background: #86efac; border-radius: 2px; }
.char-del { background: #fca5a5; border-radius: 2px; text-decoration: line-through; }

td.left-del  { background: #fff5f5; }
td.left-del .line-num  { background: #fee2e2; }
td.right-add { background: #f0fdf4; }
td.right-add .line-num { background: #dcfce7; }

tr.hunk-sep td {
  background: #f3f4f6;
  color: #6b7280;
  text-align: center;
  padding: 3px;
  font-size: 0.72rem;
  border-bottom: 1px solid #e5e7eb;
}

@media (max-width: 600px) {
  .diff-input-grid { grid-template-columns: 1fr; }
  .diff-view-toggle { margin-left: 0; }
}

/* ── Mode select ── */
.mode-select {
  border: 1px solid #d1d5db;
  border-radius: 6px;
  padding: 0.4rem 0.6rem;
  font-size: 0.85rem;
  color: #1f2937;
  background: #fff;
  outline: none;
  cursor: pointer;
  transition: border-color 0.15s;
}
.mode-select:focus { border-color: #7c3aed; }
</style>
</head>
<body>

<header>
  <h1>StringKit</h1>
  <p>ブラウザ完結型テキスト変換ツール — 外部通信なし</p>
</header>

<nav class="tabs">
  <button class="tab-btn active" onclick="switchTab('base64', this)">Base64</button>
  <button class="tab-btn"        onclick="switchTab('url',    this)">URL</button>
  <button class="tab-btn"        onclick="switchTab('html',   this)">HTML Entity</button>
  <button class="tab-btn"        onclick="switchTab('unicode',this)">Unicode</button>
  <button class="tab-btn"        onclick="switchTab('hash',   this)">Hash</button>
  <button class="tab-btn"        onclick="switchTab('case',   this)">Case</button>
  <button class="tab-btn"        onclick="switchTab('diff',   this)">Diff</button>
  <button class="tab-btn"        onclick="switchTab('time',   this)">Time</button>
  <button class="tab-btn"        onclick="switchTab('radix',  this)">Radix</button>
</nav>

<main>

  <!-- ═══════════ Base64 ═══════════ -->
  <div id="panel-base64" class="tab-panel active">
    <div class="field-label">入力</div>
    <textarea id="base64-in" placeholder="テキストまたは Base64 文字列を貼り付け…"></textarea>
    <div class="btn-row" style="align-items:center;">
      <select id="base64-mode" class="mode-select">
        <option value="encode">Encode →</option>
        <option value="decode">← Decode</option>
      </select>
      <button class="btn btn-sub"   onclick="swap('base64')">↑↓ Swap</button>
      <button class="btn btn-ghost" onclick="clear_('base64')">Clear</button>
    </div>
    <div class="err-line" id="base64-err"></div>
    <div class="field-label">出力</div>
    <div class="output-wrap">
      <textarea id="base64-out" readonly placeholder="結果がここに表示されます…"></textarea>
      <button class="copy-btn" onclick="copyOut('base64')">Copy</button>
    </div>
  </div>

  <!-- ═══════════ URL ═══════════ -->
  <div id="panel-url" class="tab-panel">
    <div class="field-label">入力</div>
    <textarea id="url-in" placeholder="テキストまたは URL エンコード済み文字列を貼り付け…"></textarea>
    <div class="btn-row" style="align-items:center;">
      <select id="url-mode" class="mode-select">
        <option value="encode">Encode →</option>
        <option value="decode">← Decode</option>
      </select>
      <button class="btn btn-sub"   onclick="swap('url')">↑↓ Swap</button>
      <button class="btn btn-ghost" onclick="clear_('url')">Clear</button>
    </div>
    <div class="err-line" id="url-err"></div>
    <div class="field-label">出力</div>
    <div class="output-wrap">
      <textarea id="url-out" readonly placeholder="結果がここに表示されます…"></textarea>
      <button class="copy-btn" onclick="copyOut('url')">Copy</button>
    </div>
  </div>

  <!-- ═══════════ HTML Entity ═══════════ -->
  <div id="panel-html" class="tab-panel">
    <div class="field-label">入力</div>
    <textarea id="html-in" placeholder="テキストまたは HTML エンティティ文字列を貼り付け…"></textarea>
    <div class="btn-row" style="align-items:center;">
      <select id="html-mode" class="mode-select">
        <option value="encode">Encode →</option>
        <option value="decode">← Decode</option>
      </select>
      <button class="btn btn-sub"   onclick="swap('html')">↑↓ Swap</button>
      <button class="btn btn-ghost" onclick="clear_('html')">Clear</button>
    </div>
    <div class="err-line" id="html-err"></div>
    <div class="field-label">出力</div>
    <div class="output-wrap">
      <textarea id="html-out" readonly placeholder="結果がここに表示されます…"></textarea>
      <button class="copy-btn" onclick="copyOut('html')">Copy</button>
    </div>
  </div>

  <!-- ═══════════ Unicode ═══════════ -->
  <div id="panel-unicode" class="tab-panel">
    <div class="field-label">入力</div>
    <textarea id="unicode-in" placeholder="テキストまたは \uXXXX / \u{XXXXX} 形式の文字列を貼り付け…"></textarea>
    <div class="btn-row" style="align-items:center;">
      <select id="unicode-mode" class="mode-select">
        <option value="escape">Escape →</option>
        <option value="unescape">← Unescape</option>
      </select>
      <button class="btn btn-sub"   onclick="swap('unicode')">↑↓ Swap</button>
      <button class="btn btn-ghost" onclick="clear_('unicode')">Clear</button>
    </div>
    <div class="err-line" id="unicode-err"></div>
    <div class="field-label">出力</div>
    <div class="output-wrap">
      <textarea id="unicode-out" readonly placeholder="結果がここに表示されます…"></textarea>
      <button class="copy-btn" onclick="copyOut('unicode')">Copy</button>
    </div>
  </div>

  <!-- ═══════════ Hash ═══════════ -->
  <div id="panel-hash" class="tab-panel">
    <div class="field-label">入力</div>
    <textarea id="hash-in" placeholder="ハッシュ化するテキストを貼り付け…"></textarea>
    <div class="btn-row" style="align-items:center;">
      <select id="hash-algo" class="mode-select">
        <option value="SHA-1">SHA-1</option>
        <option value="SHA-256" selected>SHA-256</option>
        <option value="SHA-384">SHA-384</option>
        <option value="SHA-512">SHA-512</option>
      </select>
      <button class="btn btn-ghost" onclick="clear_('hash')">Clear</button>
    </div>
    <p class="note-line">※ ハッシュは一方向変換です（復元不可）</p>
    <div class="err-line" id="hash-err"></div>
    <div class="field-label">出力</div>
    <div class="output-wrap">
      <textarea id="hash-out" readonly placeholder="結果がここに表示されます…"></textarea>
      <button class="copy-btn" onclick="copyOut('hash')">Copy</button>
    </div>
  </div>

  <!-- ═══════════ Case ═══════════ -->
  <div id="panel-case" class="tab-panel">
    <div class="field-label">入力</div>
    <textarea id="case-in" placeholder="テキストを貼り付け…"></textarea>
    <div class="btn-row" style="align-items:center;">
      <select id="case-type" class="mode-select">
        <option value="upper">UPPER CASE</option>
        <option value="lower">lower case</option>
        <option value="title">Title Case</option>
        <option value="sentence">Sentence case</option>
        <option value="camel">camelCase</option>
        <option value="pascal">PascalCase</option>
        <option value="snake">snake_case</option>
        <option value="kebab">kebab-case</option>
        <option value="constant">CONSTANT_CASE</option>
      </select>
      <button class="btn btn-ghost" onclick="clear_('case')">Clear</button>
    </div>
    <div class="err-line" id="case-err"></div>
    <div class="field-label">出力</div>
    <div class="output-wrap">
      <textarea id="case-out" readonly placeholder="結果がここに表示されます…"></textarea>
      <button class="copy-btn" onclick="copyOut('case')">Copy</button>
    </div>
  </div>

  <!-- ═══════════ Diff ═══════════ -->
  <div id="panel-diff" class="tab-panel">
    <div class="diff-input-grid">
      <div>
        <div class="field-label"><span class="diff-badge diff-badge-old">変更前</span> Original</div>
        <textarea id="diff-textA" placeholder="変更前のテキストを入力" style="height:180px"></textarea>
      </div>
      <div>
        <div class="field-label"><span class="diff-badge diff-badge-new">変更後</span> Modified</div>
        <textarea id="diff-textB" placeholder="変更後のテキストを入力" style="height:180px"></textarea>
      </div>
    </div>
    <div class="btn-row" style="margin-top:0.625rem">
      <button class="btn btn-ghost" onclick="diffClearAll()">Clear</button>
      <button class="btn btn-sub"   onclick="diffSwap()">↑↓ Swap</button>
      <div class="diff-view-toggle">
        <button id="diff-btnUnified" class="diff-vbtn active" onclick="diffSetView('unified')">統合</button>
        <button id="diff-btnSplit"   class="diff-vbtn"        onclick="diffSetView('split')">分割</button>
      </div>
    </div>
    <div class="diff-stats" id="diff-stats" style="display:none"></div>
    <div class="diff-output" id="diff-output">
      <div class="diff-empty">テキストを入力すると差分がリアルタイムで表示されます</div>
    </div>
  </div>


  <!-- ═══════════ Time ═══════════ -->
  <div id="panel-time" class="tab-panel">
    <div class="field-label">入力</div>
    <textarea id="time-in" placeholder="HH:MM:SS を含むテキストを貼り付け…"></textarea>
    <div class="btn-row" style="align-items:center; gap:1rem; flex-wrap:wrap; margin:0.625rem 0;">
      <div style="display:flex; align-items:center; gap:0.5rem;">
        <label class="field-label" for="time-offset" style="margin:0; white-space:nowrap">オフセット</label>
        <input id="time-offset" type="text" placeholder="例: 3600 または 01:00:00"
          style="border:1px solid #d1d5db; border-radius:6px; padding:0.4rem 0.75rem; font-size:0.85rem; color:#1f2937; font-family:'Courier New',Courier,monospace; width:200px; outline:none;">
      </div>
      <label style="display:flex; align-items:center; gap:0.4rem; font-size:0.875rem; color:#374151; cursor:pointer;">
        <input type="checkbox" id="time-midnight"> 日付またぎを考慮（0〜11時 → 24〜35時）
      </label>
      <button class="btn btn-ghost" onclick="timeClear()">Clear</button>
    </div>
    <div class="err-line" id="time-err"></div>
    <div class="field-label">出力</div>
    <div class="output-wrap">
      <textarea id="time-out" readonly placeholder="結果がここに表示されます…"></textarea>
      <button class="copy-btn" onclick="copyOut('time')">Copy</button>
    </div>
  </div>

  <!-- ═══════════ Radix ═══════════ -->
  <div id="panel-radix" class="tab-panel">
    <div class="field-label">入力</div>
    <textarea id="radix-in" placeholder="数値を入力（複数行可）…"></textarea>
    <div class="btn-row" style="align-items:center; gap:1rem; flex-wrap:wrap; margin:0.625rem 0;">
      <div style="display:flex; align-items:center; gap:0.5rem;">
        <label class="field-label" for="radix-from" style="margin:0; white-space:nowrap">入力</label>
        <select id="radix-from" style="border:1px solid #d1d5db; border-radius:6px; padding:0.4rem 0.6rem; font-size:0.85rem; color:#1f2937; background:#fff; outline:none; cursor:pointer;">
          <option value="2">2進数</option>
          <option value="8">8進数</option>
          <option value="10" selected>10進数</option>
          <option value="16">16進数</option>
        </select>
      </div>
      <span style="color:#9ca3af; font-size:1rem;">→</span>
      <div style="display:flex; align-items:center; gap:0.5rem;">
        <label class="field-label" for="radix-to" style="margin:0; white-space:nowrap">出力</label>
        <select id="radix-to" style="border:1px solid #d1d5db; border-radius:6px; padding:0.4rem 0.6rem; font-size:0.85rem; color:#1f2937; background:#fff; outline:none; cursor:pointer;">
          <option value="2">2進数</option>
          <option value="8">8進数</option>
          <option value="10">10進数</option>
          <option value="16" selected>16進数</option>
        </select>
      </div>
      <div style="display:flex; align-items:center; gap:0.5rem;">
        <label class="field-label" for="radix-digits" style="margin:0; white-space:nowrap">出力桁数</label>
        <input id="radix-digits" type="number" min="1" placeholder="空=自動"
          style="border:1px solid #d1d5db; border-radius:6px; padding:0.4rem 0.6rem; font-size:0.85rem; color:#1f2937; width:100px; outline:none;">
      </div>
      <button class="btn btn-ghost" onclick="radixClear()">Clear</button>
    </div>
    <div class="err-line" id="radix-err"></div>
    <div class="field-label">出力</div>
    <div class="output-wrap">
      <textarea id="radix-out" readonly placeholder="結果がここに表示されます…"></textarea>
      <button class="copy-btn" onclick="copyOut('radix')">Copy</button>
    </div>
  </div>

</main>

<script>
'use strict';

/* ═══════════════════════════════════════════
   Tab switching
═══════════════════════════════════════════ */
function switchTab(name, btn) {
  document.querySelectorAll('.tab-panel').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  btn.classList.add('active');
}

/* ═══════════════════════════════════════════
   Shared helpers
═══════════════════════════════════════════ */
function $in(ns)  { return document.getElementById(ns + '-in');  }
function $out(ns) { return document.getElementById(ns + '-out'); }
function $err(ns) { return document.getElementById(ns + '-err'); }

function setOut(ns, val) {
  $out(ns).value = val;
  $err(ns).textContent = '';
}
function setErr(ns, msg) {
  $out(ns).value = '';
  $err(ns).textContent = msg;
}

function swap(ns) {
  const b = $out(ns).value;
  if (!b) return;
  $in(ns).value = b;
  $err(ns).textContent = '';
  // 2択モードがあれば反転してから自動変換
  const modeEl = document.getElementById(ns + '-mode');
  if (modeEl && modeEl.options.length === 2) {
    modeEl.selectedIndex = 1 - modeEl.selectedIndex;
  }
  autoTransform(ns);
}

function clear_(ns) {
  $in(ns).value  = '';
  $out(ns).value = '';
  $err(ns).textContent = '';
}

function copyOut(ns) {
  const val = $out(ns).value;
  if (!val) return;
  const btn = document.querySelector('#panel-' + ns + ' .copy-btn');
  const done = () => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(val).then(done).catch(() => fallbackCopy(ns, done));
  } else {
    fallbackCopy(ns, done);
  }
}
function fallbackCopy(ns, cb) {
  const ta = $out(ns);
  ta.removeAttribute('readonly');
  ta.select();
  try { document.execCommand('copy'); } catch (_) {}
  ta.setAttribute('readonly', '');
  cb();
}

/* ═══════════════════════════════════════════
   Auto-transform dispatcher
═══════════════════════════════════════════ */
function autoTransform(ns) {
  switch (ns) {
    case 'base64':  base64Auto();  break;
    case 'url':     urlAuto();     break;
    case 'html':    htmlAuto();    break;
    case 'unicode': unicodeAuto(); break;
    case 'hash':    hashAuto();    break;
    case 'case':    caseAuto();    break;
  }
}

function base64Auto() {
  document.getElementById('base64-mode').value === 'encode'
    ? base64Encode() : base64Decode();
}
function urlAuto() {
  document.getElementById('url-mode').value === 'encode'
    ? urlEncode() : urlDecode();
}
function htmlAuto() {
  document.getElementById('html-mode').value === 'encode'
    ? htmlEncode() : htmlDecode();
}
function unicodeAuto() {
  document.getElementById('unicode-mode').value === 'escape'
    ? unicodeEscape() : unicodeUnescape();
}
async function hashAuto() {
  await computeHash(document.getElementById('hash-algo').value);
}
function caseAuto() {
  convertCase(document.getElementById('case-type').value);
}

/* ═══════════════════════════════════════════
   Base64  (Unicode-safe via TextEncoder)
═══════════════════════════════════════════ */
function base64Encode() {
  const input = $in('base64').value;
  try {
    const bytes  = new TextEncoder().encode(input);
    const binary = Array.from(bytes, b => String.fromCharCode(b)).join('');
    setOut('base64', btoa(binary));
  } catch (e) {
    setErr('base64', 'エンコード失敗: ' + e.message);
  }
}

function base64Decode() {
  const input = $in('base64').value.trim();
  try {
    const binary = atob(input);
    const bytes  = Uint8Array.from(binary, c => c.charCodeAt(0));
    setOut('base64', new TextDecoder().decode(bytes));
  } catch (_) {
    setErr('base64', '無効な Base64 文字列です');
  }
}

/* ═══════════════════════════════════════════
   URL encode / decode
═══════════════════════════════════════════ */
function urlEncode() {
  try {
    setOut('url', encodeURIComponent($in('url').value));
  } catch (e) {
    setErr('url', 'エンコード失敗: ' + e.message);
  }
}

function urlDecode() {
  try {
    setOut('url', decodeURIComponent($in('url').value));
  } catch (_) {
    setErr('url', '無効な URL エンコード文字列です');
  }
}

/* ═══════════════════════════════════════════
   HTML Entity encode / decode  (DOM trick — XSS safe)
═══════════════════════════════════════════ */
function htmlEncode() {
  const div = document.createElement('div');
  div.appendChild(document.createTextNode($in('html').value));
  setOut('html', div.innerHTML);
}

function htmlDecode() {
  const div = document.createElement('div');
  div.innerHTML = $in('html').value;
  setOut('html', div.textContent);
}

/* ═══════════════════════════════════════════
   Unicode escape / unescape
   Escape: non-printable / non-ASCII → \uXXXX or \u{XXXXX}
   Unescape: \uXXXX and \u{XXXXX} → characters
═══════════════════════════════════════════ */
function unicodeEscape() {
  const result = Array.from($in('unicode').value).map(ch => {
    const cp = ch.codePointAt(0);
    if (cp > 0xFFFF) {
      return '\\u{' + cp.toString(16).toUpperCase() + '}';
    }
    if (cp < 0x20 || cp > 0x7E) {
      return '\\u' + cp.toString(16).toUpperCase().padStart(4, '0');
    }
    return ch;
  }).join('');
  setOut('unicode', result);
}

function unicodeUnescape() {
  try {
    const result = $in('unicode').value
      .replace(/\\u\{([0-9A-Fa-f]+)\}/g,
        (_, h) => String.fromCodePoint(parseInt(h, 16)))
      .replace(/\\u([0-9A-Fa-f]{4})/g,
        (_, h) => String.fromCharCode(parseInt(h, 16)));
    setOut('unicode', result);
  } catch (_) {
    setErr('unicode', '無効な Unicode エスケープシーケンスです');
  }
}

/* ═══════════════════════════════════════════
   Hash  (Web Crypto API — ブラウザ組み込み)
═══════════════════════════════════════════ */
async function computeHash(algo) {
  const input = $in('hash').value;
  try {
    const buf = await crypto.subtle.digest(algo, new TextEncoder().encode(input));
    const hex = Array.from(new Uint8Array(buf), b => b.toString(16).padStart(2, '0')).join('');
    setOut('hash', hex);
  } catch (e) {
    setErr('hash', 'ハッシュ計算失敗: ' + e.message);
  }
}

/* ═══════════════════════════════════════════
   Case conversion
═══════════════════════════════════════════ */

/** テキストを単語配列に分割（camelCase / PascalCase / snake / kebab 対応） */
function splitWords(str) {
  return str
    .replace(/([a-z\xC0-\xFF])([A-Z\xC0-\xFF])/g, '$1 $2')  // camelCase 境界
    .replace(/([A-Z\xC0-\xFF]+)([A-Z\xC0-\xFF][a-z\xC0-\xFF])/g, '$1 $2')
    .replace(/[-_]+/g, ' ')
    .trim()
    .split(/\s+/)
    .filter(Boolean);
}

/* ═══════════════════════════════════════════
   Diff  (LCS-based line & char diff)
═══════════════════════════════════════════ */
function diffLines(aLines, bLines) {
  const m = aLines.length, n = bLines.length;
  const dp = Array.from({length: m + 1}, () => new Uint32Array(n + 1));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = aLines[i-1] === bLines[j-1]
        ? dp[i-1][j-1] + 1
        : Math.max(dp[i-1][j], dp[i][j-1]);
  const ops = [];
  let i = m, j = n;
  while (i > 0 || j > 0) {
    if (i > 0 && j > 0 && aLines[i-1] === bLines[j-1]) {
      ops.push({type: 'eq', a: aLines[i-1], b: bLines[j-1]}); i--; j--;
    } else if (j > 0 && (i === 0 || dp[i][j-1] >= dp[i-1][j])) {
      ops.push({type: 'ins', b: bLines[j-1]}); j--;
    } else {
      ops.push({type: 'del', a: aLines[i-1]}); i--;
    }
  }
  return ops.reverse();
}

function diffChars(a, b) {
  const m = a.length, n = b.length;
  if (m === 0 && n === 0) return {aHtml: '', bHtml: ''};
  const dp = Array.from({length: m + 1}, () => new Uint16Array(n + 1));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1] === b[j-1]
        ? dp[i-1][j-1] + 1
        : Math.max(dp[i-1][j], dp[i][j-1]);
  const aParts = [], bParts = [];
  let i = m, j = n;
  while (i > 0 || j > 0) {
    if (i > 0 && j > 0 && a[i-1] === b[j-1]) {
      aParts.push({type: 'eq', ch: a[i-1]}); bParts.push({type: 'eq', ch: b[j-1]}); i--; j--;
    } else if (j > 0 && (i === 0 || dp[i][j-1] >= dp[i-1][j])) {
      bParts.push({type: 'ins', ch: b[j-1]}); j--;
    } else {
      aParts.push({type: 'del', ch: a[i-1]}); i--;
    }
  }
  aParts.reverse(); bParts.reverse();
  const render = (parts, insClass, delClass) => {
    let html = '', k = 0;
    while (k < parts.length) {
      const {type, ch} = parts[k];
      if (type === 'eq') { html += diffEsc(ch); k++; continue; }
      let run = '';
      while (k < parts.length && parts[k].type === type) { run += parts[k].ch; k++; }
      html += `<span class="${type === 'ins' ? insClass : delClass}">${diffEsc(run)}</span>`;
    }
    return html;
  };
  return { aHtml: render(aParts, '', 'char-del'), bHtml: render(bParts, 'char-add', '') };
}

function diffEsc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

const DIFF_CTX = 3;
function diffGroupOps(ops) {
  const changed = ops.map(o => o.type !== 'eq');
  const show = new Array(ops.length).fill(false);
  for (let i = 0; i < ops.length; i++) {
    if (!changed[i]) continue;
    for (let d = -DIFF_CTX; d <= DIFF_CTX; d++) {
      const k = i + d;
      if (k >= 0 && k < ops.length) show[k] = true;
    }
  }
  const groups = [];
  let i = 0;
  while (i < ops.length) {
    if (show[i]) {
      const start = i;
      while (i < ops.length && show[i]) i++;
      groups.push({type: 'show', ops: ops.slice(start, i)});
    } else {
      const start = i;
      while (i < ops.length && !show[i]) i++;
      groups.push({type: 'hide', count: i - start});
    }
  }
  return groups;
}

let diffCurrentView = 'unified';

function diffRender() {
  const a = document.getElementById('diff-textA').value;
  const b = document.getElementById('diff-textB').value;
  const aLines = a === '' ? [] : a.split('\n');
  const bLines = b === '' ? [] : b.split('\n');
  const ops = diffLines(aLines, bLines);
  const groups = diffGroupOps(ops);
  const statsEl = document.getElementById('diff-stats');
  const outEl   = document.getElementById('diff-output');

  if (a === '' && b === '') {
    statsEl.style.display = 'none';
    outEl.innerHTML = '<div class="diff-empty">テキストを入力すると差分がリアルタイムで表示されます</div>';
    return;
  }

  let adds = 0, dels = 0, eqs = 0;
  ops.forEach(o => { if (o.type==='ins') adds++; else if (o.type==='del') dels++; else eqs++; });
  statsEl.style.display = 'flex';
  statsEl.innerHTML = `
    <span><span class="diff-stat-add">+${adds}</span> 追加</span>
    <span><span class="diff-stat-del">-${dels}</span> 削除</span>
    <span><span class="diff-stat-eq">${eqs}</span> 変更なし</span>
  `;

  if (adds === 0 && dels === 0) {
    outEl.innerHTML = '<div class="diff-empty" style="color:#15803d">&#10003; 差分はありません（2つのテキストは同一です）</div>';
    return;
  }

  outEl.innerHTML = diffCurrentView === 'unified'
    ? diffRenderUnified(groups)
    : diffRenderSplit(groups);
}

function diffRenderUnified(groups) {
  let html = '<table class="unified-table">';
  let aNum = 0, bNum = 0;
  for (const grp of groups) {
    if (grp.type === 'hide') {
      html += `<tr class="hunk-sep"><td colspan="4">… ${grp.count} 行省略 …</td></tr>`;
      continue;
    }
    const ops = grp.ops;
    let i = 0;
    while (i < ops.length) {
      const op = ops[i];
      if (op.type === 'del' && i + 1 < ops.length && ops[i+1].type === 'ins') {
        const {aHtml, bHtml} = diffChars(op.a, ops[i+1].b);
        aNum++;
        html += `<tr class="del"><td class="line-num">${aNum}</td><td class="line-num"></td><td class="line-sign">−</td><td class="line-content">${aHtml || '&nbsp;'}</td></tr>`;
        bNum++;
        html += `<tr class="add"><td class="line-num"></td><td class="line-num">${bNum}</td><td class="line-sign">+</td><td class="line-content">${bHtml || '&nbsp;'}</td></tr>`;
        i += 2;
      } else if (op.type === 'del') {
        aNum++;
        html += `<tr class="del"><td class="line-num">${aNum}</td><td class="line-num"></td><td class="line-sign">−</td><td class="line-content">${diffEsc(op.a) || '&nbsp;'}</td></tr>`;
        i++;
      } else if (op.type === 'ins') {
        bNum++;
        html += `<tr class="add"><td class="line-num"></td><td class="line-num">${bNum}</td><td class="line-sign">+</td><td class="line-content">${diffEsc(op.b) || '&nbsp;'}</td></tr>`;
        i++;
      } else {
        aNum++; bNum++;
        html += `<tr class="ctx"><td class="line-num">${aNum}</td><td class="line-num">${bNum}</td><td class="line-sign"> </td><td class="line-content">${diffEsc(op.a) || '&nbsp;'}</td></tr>`;
        i++;
      }
    }
  }
  return html + '</table>';
}

function diffRenderSplit(groups) {
  let html = '<table class="split-table">';
  let aNum = 0, bNum = 0;
  const lCell = (cls, num, content) =>
    `<td class="${cls}"><div style="display:flex"><div class="line-num">${num}</div><div class="line-content">${content || '&nbsp;'}</div></div></td>`;
  const rCell = lCell;
  for (const grp of groups) {
    if (grp.type === 'hide') {
      html += `<tr class="hunk-sep"><td colspan="3">… ${grp.count} 行省略 …</td></tr>`;
      continue;
    }
    const ops = grp.ops;
    let i = 0;
    while (i < ops.length) {
      const op = ops[i];
      if (op.type === 'del' || op.type === 'ins') {
        const dels = [], inss = [];
        while (i < ops.length && (ops[i].type === 'del' || ops[i].type === 'ins')) {
          if (ops[i].type === 'del') dels.push(ops[i]); else inss.push(ops[i]);
          i++;
        }
        const maxLen = Math.max(dels.length, inss.length);
        for (let k = 0; k < maxLen; k++) {
          const d = dels[k], ins = inss[k];
          let lc = '', rc = '', ln = '', rn = '';
          if (d && ins) {
            const {aHtml, bHtml} = diffChars(d.a, ins.b);
            aNum++; ln = aNum; lc = aHtml;
            bNum++; rn = bNum; rc = bHtml;
            html += `<tr>${lCell('left-del', ln, lc)}<td class="split-divider"></td>${rCell('right-add', rn, rc)}</tr>`;
          } else if (d) {
            aNum++; ln = aNum; lc = diffEsc(d.a);
            html += `<tr>${lCell('left-del', ln, lc)}<td class="split-divider"></td>${rCell('', '', '')}</tr>`;
          } else {
            bNum++; rn = bNum; rc = diffEsc(ins.b);
            html += `<tr>${lCell('', '', '')}<td class="split-divider"></td>${rCell('right-add', rn, rc)}</tr>`;
          }
        }
      } else {
        aNum++; bNum++;
        const content = diffEsc(op.a);
        html += `<tr>${lCell('ctx', aNum, content)}<td class="split-divider"></td>${rCell('ctx', bNum, content)}</tr>`;
        i++;
      }
    }
  }
  return html + '</table>';
}

function diffSetView(v) {
  diffCurrentView = v;
  document.getElementById('diff-btnUnified').classList.toggle('active', v === 'unified');
  document.getElementById('diff-btnSplit').classList.toggle('active', v === 'split');
  diffRender();
}

function diffClearAll() {
  document.getElementById('diff-textA').value = '';
  document.getElementById('diff-textB').value = '';
  diffRender();
}

function diffSwap() {
  const a = document.getElementById('diff-textA');
  const b = document.getElementById('diff-textB');
  const tmp = a.value; a.value = b.value; b.value = tmp;
  diffRender();
}

document.addEventListener('DOMContentLoaded', () => {
  // 既存タブ: 入力 & モード変更で自動変換
  ['base64', 'url', 'html', 'unicode'].forEach(ns => {
    $in(ns).addEventListener('input', () => autoTransform(ns));
    document.getElementById(ns + '-mode').addEventListener('change', () => autoTransform(ns));
  });
  $in('hash').addEventListener('input', hashAuto);
  document.getElementById('hash-algo').addEventListener('change', hashAuto);
  $in('case').addEventListener('input', caseAuto);
  document.getElementById('case-type').addEventListener('change', caseAuto);

  // Diff
  document.getElementById('diff-textA').addEventListener('input', diffRender);
  document.getElementById('diff-textB').addEventListener('input', diffRender);

  // Time
  document.getElementById('time-in').addEventListener('input', timeTransform);
  document.getElementById('time-offset').addEventListener('input', timeTransform);
  document.getElementById('time-midnight').addEventListener('change', timeTransform);

  // Radix
  ['radix-in', 'radix-from', 'radix-to', 'radix-digits'].forEach(id => {
    document.getElementById(id).addEventListener('input', radixTransform);
  });
});

/* ═══════════════════════════════════════════
   Time offset conversion
═══════════════════════════════════════════ */

/** オフセット文字列を秒数に変換。無効な場合は null を返す */
function parseTimeOffset(str) {
  str = str.trim();
  if (str === '') return 0;
  const hmsMatch = str.match(/^(-?)(\d+):(\d{2}):(\d{2})$/);
  if (hmsMatch) {
    const sign = hmsMatch[1] === '-' ? -1 : 1;
    const m = parseInt(hmsMatch[3], 10), s = parseInt(hmsMatch[4], 10);
    if (m > 59 || s > 59) return null;
    return sign * (parseInt(hmsMatch[2], 10) * 3600 + m * 60 + s);
  }
  if (/^-?\d+$/.test(str)) return parseInt(str, 10);
  return null;
}

/** 秒数を HH:MM:SS 文字列に変換（時は 2 桁以上） */
function secondsToHMS(totalSec) {
  const neg = totalSec < 0;
  const abs = Math.abs(totalSec);
  const h = Math.floor(abs / 3600);
  const m = Math.floor((abs % 3600) / 60);
  const s = abs % 60;
  const p = n => String(n).padStart(2, '0');
  return (neg ? '-' : '') + p(h) + ':' + p(m) + ':' + p(s);
}

function timeTransform() {
  const input = document.getElementById('time-in').value;
  const offsetStr = document.getElementById('time-offset').value;
  const midnight = document.getElementById('time-midnight').checked;
  const errEl = document.getElementById('time-err');
  const outEl = document.getElementById('time-out');

  const offset = parseTimeOffset(offsetStr);
  if (offset === null) {
    errEl.textContent = '無効なオフセット形式です（例: 3600 または 01:00:00）';
    outEl.value = '';
    return;
  }
  errEl.textContent = '';

  const result = input.replace(/\b(\d{1,2}):(\d{2}):(\d{2})\b/g, (match, hh, mm, ss) => {
    const h = parseInt(hh, 10), m = parseInt(mm, 10), s = parseInt(ss, 10);
    if (m > 59 || s > 59) return match;
    let totalSec = h * 3600 + m * 60 + s;
    if (midnight && h < 12) totalSec += 24 * 3600;
    totalSec += offset;
    return secondsToHMS(totalSec);
  });

  outEl.value = result;
}

function timeClear() {
  document.getElementById('time-in').value = '';
  document.getElementById('time-out').value = '';
  document.getElementById('time-offset').value = '';
  document.getElementById('time-err').textContent = '';
}

/* ═══════════════════════════════════════════
   Radix conversion  (2 / 8 / 10 / 16)
═══════════════════════════════════════════ */

const RADIX_VALID = {
  2:  /^[01]+$/,
  8:  /^[0-7]+$/,
  10: /^\d+$/,
  16: /^[0-9a-fA-F]+$/i
};

function radixTransform() {
  const input     = document.getElementById('radix-in').value;
  const fromRadix = parseInt(document.getElementById('radix-from').value, 10);
  const toRadix   = parseInt(document.getElementById('radix-to').value,   10);
  const digitsStr = document.getElementById('radix-digits').value.trim();
  const padWidth  = digitsStr === '' ? 0 : Math.max(0, parseInt(digitsStr, 10) || 0);
  const errEl     = document.getElementById('radix-err');
  const outEl     = document.getElementById('radix-out');

  const lines   = input.split('\n');
  const results = [];
  let hasError  = false;

  for (const line of lines) {
    const trimmed = line.trim();
    if (trimmed === '') { results.push(''); continue; }

    const neg = trimmed.startsWith('-');
    const abs = neg ? trimmed.slice(1) : trimmed;

    if (abs === '' || !RADIX_VALID[fromRadix].test(abs)) {
      results.push('[エラー: "' + trimmed + '" は ' + fromRadix + '進数として無効]');
      hasError = true;
      continue;
    }

    const num    = parseInt(abs, fromRadix);
    let   result = num.toString(toRadix).toUpperCase();
    if (padWidth > 0) result = result.padStart(padWidth, '0');
    results.push(neg ? '-' + result : result);
  }

  errEl.textContent = hasError ? '一部の行に変換できない値があります' : '';
  outEl.value = results.join('\n');
}

function radixClear() {
  document.getElementById('radix-in').value  = '';
  document.getElementById('radix-out').value = '';
  document.getElementById('radix-err').textContent = '';
}

/* ═══════════════════════════════════════════
   Case conversion
═══════════════════════════════════════════ */
function convertCase(type) {
  const input = $in('case').value;
  const words = splitWords(input);
  if (!words.length) { setOut('case', ''); return; }

  const cap  = w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase();
  const low  = w => w.toLowerCase();
  const up   = w => w.toUpperCase();

  let result;
  switch (type) {
    case 'upper':    result = input.toUpperCase(); break;
    case 'lower':    result = input.toLowerCase(); break;
    case 'title':    result = words.map(cap).join(' '); break;
    case 'sentence': result = words.map(low).join(' ');
                     result = result.charAt(0).toUpperCase() + result.slice(1); break;
    case 'camel':    result = words.map((w, i) => i === 0 ? low(w) : cap(w)).join(''); break;
    case 'pascal':   result = words.map(cap).join(''); break;
    case 'snake':    result = words.map(low).join('_'); break;
    case 'kebab':    result = words.map(low).join('-'); break;
    case 'constant': result = words.map(up).join('_'); break;
    default:         result = input;
  }
  setOut('case', result);
}
